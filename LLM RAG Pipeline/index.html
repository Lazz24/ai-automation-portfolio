<script>
    const GROQ_API_KEY = "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";
    async function askGroq() {
        const query = document.getElementById('query').value;
        const responseDiv = document.getElementById('response');
        const loadingDiv = document.getElementById('loading');
        if (!query) { responseDiv.innerHTML = "Please enter a question."; return; }
        loadingDiv.style.display = 'block';
        responseDiv.innerHTML = "";
        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    messages: [
                        {role: "system", content: "You are a CSRD compliance assistant for Dutch SMEs."},
                        {role: "user", content: query}
                    ],
                    model: "mixtral-8x7b-32768"
                })
            });
            const data = await response.json();
            if (data.choices && data.choices[0].message) {
                responseDiv.innerHTML = `<strong>Response:</strong><br>${data.choices[0].message.content}`;
            } else {
                responseDiv.innerHTML = "Error: " + (data.error?.message || "Unknown error");
            }
        } catch (error) {
            responseDiv.innerHTML = "Error: " + error.message;
        } finally {
            loadingDiv.style.display = 'none';
        }
    }
</script>
